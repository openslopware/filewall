# filewall — system configuration  (/etc/filewall/config.toml)
#
# This is the file the packaged filewalld.service reads. As shipped it defines NO
# watches, so the daemon starts cleanly and guards nothing until you opt in below.
# Uncomment and adapt a [[watch]] block, then reload with `filewallctl reload`
# (or `systemctl reload filewalld`) — no restart needed.
#
# ┌─ IMPORTANT: paths are resolved by the DAEMON, which runs as ROOT under systemd.
# │  A leading `~` therefore expands to /root — NOT a desktop user's home. To guard
# │  a user's files, write the ABSOLUTE path, e.g. /home/alice/.ssh (replace the
# └─ USER placeholders below with the real account name).
#
# For each [[watch]], filewalld places fanotify open-permission marks: a directory
# watch marks the directory (and every sub-directory) so the kernel fires for opens
# of its files — one mark per directory, not per file — while a single-file watch
# marks just that file. Directory watches cover newly-created and atomically-renamed
# files automatically, and new sub-directories are live-marked as they appear (via
# inotify). When a process opens a guarded file, the daemon decides — from this
# config plus any *learned* rules — whether to allow, deny, or prompt the user via
# the filewall-ui helper.

# ─── Global settings ────────────────────────────────────────────────────────

# What to do when an access is NOT matched by a watch's `allow` list.
#   "prompt" — ask the user (default)
#   "allow"  — permit silently (audit-only: pair with learned deny rules)
#   "deny"   — refuse silently (lockdown: only `allow`-listed exes get through)
default_action = "prompt"

# How long to wait for the user to answer a prompt before failing closed (deny).
# A generous timeout avoids spurious denials when you step away mid-decision.
prompt_timeout_seconds = 120

# Unix socket the daemon binds and the filewall-ui helper connects to.
# Matches the packaged unit's RuntimeDirectory=filewall (→ /run/filewall).
socket_path = "/run/filewall/prompt.sock"

# Control socket `filewallctl` queries (e.g. `dump`, `status`). Kept separate
# from the prompt socket so the fail-closed prompt path is never touched.
control_socket_path = "/run/filewall/control.sock"

# Where "Always allow/deny" decisions are persisted (learned rules). The daemon
# reloads this on the same trigger as the config. Matches the packaged unit's
# StateDirectory=filewall (→ /var/lib/filewall).
rules_path = "/var/lib/filewall/rules.toml"


# ─── Watch blocks (all disabled — uncomment to enable) ──────────────────────
#
# Each [[watch]] guards one directory tree (or a single file). Fields:
#
#   path          Required. The ABSOLUTE root to guard (see the ROOT note above —
#                 `~` resolves to /root, not a user home). Symlinked roots are
#                 canonicalized so they still match.
#
#   allow         Globs matched against the accessing process's *executable*
#                 path (e.g. /usr/bin/ssh). A match → allow without prompting.
#                 Glob rules: `*` does NOT cross `/`, `**` does. Empty = nothing
#                 is pre-allowed (every access goes to `default_action`).
#
#   exclude       Globs matched against absolute paths under `path`. Two effects:
#                 - a matching DIRECTORY prunes its whole subtree (never marked or
#                   traversed) — this keeps noisy, non-sensitive trees (browser
#                   caches, etc.) from exhausting the kernel limits, since a
#                   directory watch places one fanotify mark AND one inotify watch per
#                   directory (fs.fanotify.max_user_marks / fs.inotify.max_user_watches).
#                 - a matching FILE is auto-allowed at access time, with no prompt
#                   (the parent directory's mark fires for every child, so the daemon
#                   filters these out itself). Use it to silence known-noisy files.
#                 Same glob rules as `allow`.
#
#   patterns      Globs (matched RELATIVE to `path`) selecting which children are
#                 in scope; a child matching none is auto-allowed. Empty (default)
#                 = the whole tree. A SHALLOW pattern (`*_history`, no `/` or `**`)
#                 marks just this one directory; a DEEP pattern (`**/...` or any
#                 with `/`) marks the entire subtree (warned at load — a careless
#                 `**` can exhaust the kernel mark/watch limits). See Approach 6.
#
#   learn_object  What an "Always" decision records: "file" (this exact path,
#                 default) or "tree" (the whole watch root). Use "tree" for
#                 sprawling app-config dirs where per-file rules are unmanageable.
#
#   learn_match   Subset of ["exe", "cwd"]. "cwd" pins a learned rule to the
#                 working directory the process was launched from — tighter, but
#                 the rule only applies when launched from that same cwd.


# Approach 1 — Allowlist a known toolchain, prompt on anything else.
# The common case: SSH keys that ssh/git legitimately read; anyone else asks.
#[[watch]]
#path = "/home/USER/.ssh"
#allow = ["/usr/bin/ssh", "/usr/bin/ssh-*", "/usr/bin/git"]
#learn_object = "file"
#learn_match = ["exe"]


# Approach 2 — Lock down a single secret file with NO allowlist.
# Every reader is prompted (or denied, per default_action). Good for tokens.
#[[watch]]
#path = "/home/USER/.vault-token"
#allow = []
#learn_object = "file"
#learn_match = ["exe"]


# Approach 3 — Tree-mode learning for a sprawling app directory.
# Browser/Electron config dirs hold thousands of files; record decisions at the
# tree level, and `exclude` the cache subtrees so we don't waste fanotify marks
# on disposable data.
#[[watch]]
#path = "/home/USER/.config/Ferdium"
#allow = []
#exclude = [
#    "**/Cache",
#    "**/Cache_Data",
#    "**/Code Cache",
#    "**/GPUCache",
#    "**/Service Worker/CacheStorage",
#]
#learn_object = "tree"
#learn_match = ["exe"]


# Approach 4 — cwd-pinned rules for a dev secret.
# `learn_match = ["exe", "cwd"]` means an "Always allow" only applies when the
# same binary is run from the same project directory — so `node` reading your
# AWS creds is remembered for *this* project, not globally.
#[[watch]]
#path = "/home/USER/.aws"
#allow = ["/usr/bin/aws"]
#learn_object = "file"
#learn_match = ["exe", "cwd"]


# Approach 5 — Allowlist a toolchain and exclude its churny housekeeping files.
# GnuPG's own binaries are pre-allowed; everything else hits default_action. The
# `exclude` globs drop lockfiles and the random seed, which GnuPG rewrites
# constantly and which carry no secrets — no point prompting on them.
# (`default_action` is global, not per-watch; for a fail-closed posture on the
# whole daemon set `default_action = "deny"` at the top of this file.)
#[[watch]]
#path = "/home/USER/.gnupg"
#allow = ["/usr/bin/gpg", "/usr/bin/gpg-agent"]
#exclude = ["**/*.lock", "**/random_seed"]
#learn_object = "tree"
#learn_match = ["exe"]


# Approach 6 — Guard a CLASS of files in a busy dir with `patterns` (shallow).
# Shell-history files live directly in $HOME among thousands of unrelated files.
# A shallow pattern marks ONLY $HOME (one fanotify mark) and prompts solely for
# the history-shaped files; every other immediate child is auto-allowed. It is
# also robust to the atomic temp+rename zsh/bash use (a single-file mark would be
# orphaned by the rename; the directory mark is not).
#[[watch]]
#path = "/home/USER"
#allow = []
#patterns = [".zsh_history", ".bash_history", ".python_history", "*_history"]
#learn_object = "file"
#learn_match = ["exe"]
